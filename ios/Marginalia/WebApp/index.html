<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Marginalia</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  color: #00ff41;
  font-family: 'Courier New', monospace;
  font-size: 14px;
  padding: 8px;
  min-height: 100vh;
}
#status { color: #666; font-size: 11px; margin-bottom: 8px; }
#lens {
  border: 1px solid #333;
  padding: 12px;
  min-height: 144px;
  margin-bottom: 8px;
}
#lens .option { margin: 4px 0; font-size: 16px; }
#lens .option.selected { color: #fff; }
#mirror-label { color: #444; font-size: 10px; margin-bottom: 4px; }
#debug { color: #444; font-size: 10px; margin-top: 8px; white-space: pre-wrap; }
</style>
</head>
<body>
<div id="mirror-label">G2 LENS MIRROR</div>
<div id="lens">
  <div id="display">Listening...</div>
</div>
<div id="status">Connecting...</div>
<div id="debug"></div>

<script>
const SERVER = window.location.origin;
const AUDIO_BUFFER_SECONDS = 3;
const SAMPLE_RATE = 16000;

let bridge = null;
let audioBuffer = [];
let audioBufferSize = 0;
let selectedOption = 0;
let currentOptions = null;
let isProcessing = false;

function log(msg) {
  console.log('[Marginalia] ' + msg);
  const el = document.getElementById('debug');
  el.textContent = msg + '\n' + el.textContent.substring(0, 500);
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function setDisplay(html) {
  document.getElementById('display').innerHTML = html;
}

function renderOptions(options) {
  currentOptions = options;
  selectedOption = 0;
  let html = '';
  options.forEach((opt, i) => {
    const glyph = i === selectedOption ? '\u25C9' : '\u25CB';
    const cls = i === selectedOption ? 'option selected' : 'option';
    html += '<div class="' + cls + '">' + glyph + ' ' + opt.label + '</div>';
  });
  setDisplay(html);

  // Send to G2 glasses if bridge available
  if (bridge) {
    const glassesText = options.map((opt, i) =>
      (i === 0 ? '\u25C9' : '\u25CB') + ' ' + opt.label
    ).join('\n');
    try {
      bridge.textContainerUpgrade(glassesText);
    } catch (e) {
      log('G2 display error: ' + e.message);
    }
  }
}

function renderDone(label) {
  const html = '<div class="option selected">\u2713 Done \u2014 ' + label + '</div>';
  setDisplay(html);
  if (bridge) {
    try {
      bridge.textContainerUpgrade('\u2713 Done \u2014 ' + label);
    } catch (e) {}
  }
}

async function checkHealth() {
  try {
    const r = await fetch(SERVER + '/health');
    const d = await r.json();
    setStatus('Server: ' + d.status + ' | Model: ' + (d.model_loaded ? 'ready' : 'loading...'));
    return d.status === 'ok';
  } catch (e) {
    setStatus('Server offline');
    return false;
  }
}

async function sendAudio(pcmBytes) {
  if (isProcessing) return;
  isProcessing = true;
  setDisplay('Processing...');
  setStatus('Sending audio...');

  try {
    const blob = new Blob([pcmBytes], { type: 'application/octet-stream' });
    const r = await fetch(SERVER + '/inference', {
      method: 'POST',
      body: blob,
      headers: { 'Content-Type': 'application/octet-stream' }
    });
    const data = await r.json();

    if (data.options && data.options.length > 0) {
      renderOptions(data.options);
      setStatus('Ready | ' + (data.inference_time_ms || '?') + 'ms');
      log('Got ' + data.options.length + ' options in ' + (data.inference_time_ms || '?') + 'ms');
    } else {
      setDisplay('No options returned');
      setStatus('Error: empty response');
    }
  } catch (e) {
    log('Inference error: ' + e.message);
    setDisplay('Error');
    setStatus('Inference failed');
  }
  isProcessing = false;
}

async function executeToolCall(option) {
  if (!option.action) {
    renderDone(option.label);
    return;
  }

  try {
    const r = await fetch(SERVER + '/tool-call-json', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: option.action, args: option.args || {} })
    });
    const data = await r.json();
    log('Tool result: ' + JSON.stringify(data));
    renderDone(option.label);
  } catch (e) {
    log('Tool error: ' + e.message);
  }
}

// Even Realities G2 bridge setup
async function initBridge() {
  if (typeof waitForEvenAppBridge === 'function') {
    try {
      bridge = await waitForEvenAppBridge();
      log('EvenAppBridge connected');

      // Create startup container
      bridge.createStartUpPageContainer({
        textContainer: { text: 'Listening...', fontSize: 20 }
      });

      // Start audio capture from G2 mic
      bridge.audioControl(true);
      log('G2 audio started');

      // Listen for audio PCM data
      bridge.onEvenHubEvent((event) => {
        if (event.audioEvent && event.audioEvent.audioPcm) {
          const pcm = event.audioEvent.audioPcm;
          audioBuffer.push(pcm);
          audioBufferSize += pcm.byteLength;

          // Buffer AUDIO_BUFFER_SECONDS worth of audio
          const targetBytes = SAMPLE_RATE * 2 * AUDIO_BUFFER_SECONDS; // 16-bit = 2 bytes/sample
          if (audioBufferSize >= targetBytes) {
            const combined = new Uint8Array(audioBufferSize);
            let offset = 0;
            for (const chunk of audioBuffer) {
              combined.set(new Uint8Array(chunk.buffer || chunk), offset);
              offset += chunk.byteLength;
            }
            audioBuffer = [];
            audioBufferSize = 0;
            sendAudio(combined);
          }
        }

        // R1 ring press — select current option
        if (event.ringEvent || event.gestureEvent) {
          log('Ring/gesture event: ' + JSON.stringify(event));
          if (currentOptions && currentOptions.length > 0) {
            executeToolCall(currentOptions[selectedOption]);
          }
        }
      });

      setStatus('G2 connected | Listening');
    } catch (e) {
      log('Bridge init failed: ' + e.message);
      setStatus('No G2 — using server only');
    }
  } else {
    log('Not in Even Realities WebView');
    setStatus('Standalone mode — no G2');
  }
}

// Init
(async () => {
  log('Marginalia starting...');
  await checkHealth();
  await initBridge();

  // Poll health every 5s
  setInterval(checkHealth, 5000);
})();
</script>
</body>
</html>
